<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScrollNews Master</title>
    
    <!-- Tailwind CSS (via CDN para estilo rápido e bonito) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Reset e Fontes */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none; /* Impede seleção de texto para visual de TV */
        }

        /* O Scroller Infinito */
        #scroller-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            overflow: hidden;
            transition: width 0.5s, height 0.5s, transform 0.5s;
        }

        #scroller-track {
            display: flex;
            align-items: center;
            white-space: nowrap;
            will-change: transform; /* Otimização de GPU */
        }

        .news-item {
            display: flex;
            align-items: center;
        }

        /* Menu Lateral */
        #settings-panel {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Utilitários de Slider Customizado */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #4B5563;
            border-radius: 2px;
        }
        
        /* Classes para Rotação de Tela via Software */
        .rotated-mode {
            width: 100vh !important;
            height: 100vw !important;
            transform: translate(-50%, -50%) rotate(90deg) !important;
        }
    </style>
</head>
<body>

    <!-- ================= CONTEÚDO PRINCIPAL ================= -->
    
    <!-- O Container que gira e segura o texto -->
    <div id="scroller-container">
        <!-- A trilha que se move -->
        <div id="scroller-track">
            <!-- O conteúdo será injetado aqui via JavaScript -->
        </div>
    </div>

    <!-- Botão de Abrir Configurações -->
    <button id="btn-open-settings" class="fixed bottom-6 right-6 z-50 p-3 bg-white/10 hover:bg-white/20 text-white rounded-full backdrop-blur-md shadow-lg border border-white/10 transition-transform hover:scale-110">
        <i data-lucide="settings"></i>
    </button>

    <!-- ================= PAINEL DE CONTROLE ================= -->
    <div id="settings-panel" class="fixed inset-y-0 right-0 z-50 w-80 bg-zinc-900/95 backdrop-blur-xl border-l border-white/10 shadow-2xl transform translate-x-full text-gray-200 flex flex-col">
        
        <!-- Header -->
        <div class="p-5 border-b border-white/10 flex justify-between items-center bg-black/20">
            <h2 class="font-bold flex items-center gap-2 text-white">
                <i data-lucide="monitor" class="text-blue-500 w-5 h-5"></i> Painel Pro
            </h2>
            <button id="btn-close-settings" class="hover:text-white text-gray-400">
                <i data-lucide="x"></i>
            </button>
        </div>

        <!-- Scroll Content -->
        <div class="flex-1 overflow-y-auto p-5 space-y-6">
            
            <!-- Controles de Tela -->
            <div class="grid grid-cols-2 gap-3">
                <button id="btn-fullscreen" class="flex flex-col items-center justify-center p-3 rounded bg-white/5 hover:bg-white/10 border border-white/5 transition-colors">
                    <i data-lucide="maximize" class="w-5 h-5 mb-1"></i>
                    <span class="text-[10px] font-bold uppercase">Fullscreen</span>
                </button>
                <button id="btn-rotate" class="flex flex-col items-center justify-center p-3 rounded bg-white/5 hover:bg-white/10 border border-white/5 transition-colors">
                    <i data-lucide="smartphone" class="w-5 h-5 mb-1"></i>
                    <span class="text-[10px] font-bold uppercase">Girar Tela</span>
                </button>
            </div>

            <!-- Tópicos -->
            <section class="space-y-2">
                <h3 class="text-xs font-bold text-gray-500 uppercase flex items-center gap-2">
                    <i data-lucide="globe" class="w-3 h-3"></i> Fontes
                </h3>
                <!-- Checkboxes gerados dinamicamente ou estáticos -->
                <label class="flex items-center justify-between p-2 rounded cursor-pointer hover:bg-white/5 bg-zinc-800/50">
                    <span class="text-xs font-medium">Nacional</span>
                    <input type="checkbox" id="check-nacional" checked class="accent-blue-500 w-4 h-4">
                </label>
                <label class="flex items-center justify-between p-2 rounded cursor-pointer hover:bg-white/5 bg-zinc-800/50">
                    <span class="text-xs font-medium">Internacional</span>
                    <input type="checkbox" id="check-internacional" class="accent-blue-500 w-4 h-4">
                </label>
                <label class="flex items-center justify-between p-2 rounded cursor-pointer hover:bg-white/5 bg-zinc-800/50">
                    <span class="text-xs font-medium">Esportes</span>
                    <input type="checkbox" id="check-esportes" checked class="accent-blue-500 w-4 h-4">
                </label>
                <label class="flex items-center justify-between p-2 rounded cursor-pointer hover:bg-white/5 bg-zinc-800/50">
                    <span class="text-xs font-medium text-yellow-400">Data e Hora</span>
                    <input type="checkbox" id="check-tempo" checked class="accent-yellow-400 w-4 h-4">
                </label>
            </section>

            <!-- Velocidade -->
            <section class="bg-blue-900/20 p-4 rounded-lg border border-blue-500/20">
                <div class="flex justify-between text-xs font-bold text-blue-200 mb-2">
                    <span class="flex items-center gap-1"><i data-lucide="zap" class="w-3 h-3"></i> VELOCIDADE</span>
                    <span id="speed-display">2.0x</span>
                </div>
                <input type="range" id="input-speed" min="0" max="15" step="0.1" value="2.0" class="w-full">
            </section>

            <!-- Aparência -->
            <section class="space-y-4">
                <h3 class="text-xs font-bold text-gray-500 uppercase flex items-center gap-2">
                    <i data-lucide="palette" class="w-3 h-3"></i> Aparência
                </h3>
                
                <div class="grid grid-cols-3 gap-2">
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] text-gray-500 font-bold uppercase">Fundo</label>
                        <input type="color" id="color-bg" value="#000000" class="w-full h-8 rounded cursor-pointer">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] text-gray-500 font-bold uppercase">Texto</label>
                        <input type="color" id="color-text" value="#ffffff" class="w-full h-8 rounded cursor-pointer">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] text-gray-500 font-bold uppercase">Separador</label>
                        <input type="color" id="color-separator" value="#ff0000" class="w-full h-8 rounded cursor-pointer">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between text-[10px] text-gray-500 font-bold uppercase mb-1">
                        <span>Tamanho Fonte</span>
                    </div>
                    <input type="range" id="input-fontsize" min="2" max="30" step="0.5" value="10" class="w-full accent-white">
                </div>

                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase">Texto Separador</label>
                    <input type="text" id="input-sep-text" value="ScrollNews" class="w-full bg-white/5 border border-white/10 rounded px-2 py-1 text-sm text-white mt-1 outline-none focus:border-blue-500">
                </div>
                
                <label class="flex items-center gap-2">
                    <input type="checkbox" id="check-uppercase" checked class="accent-blue-500 w-4 h-4">
                    <span class="text-xs text-gray-400">CAIXA ALTA</span>
                </label>
            </section>
        </div>

        <!-- Footer -->
        <div class="p-4 border-t border-white/10 bg-black/20">
            <button id="btn-refresh" class="w-full py-2 bg-white/10 hover:bg-white/20 text-white text-xs font-bold rounded flex items-center justify-center gap-2 transition-colors">
                <i data-lucide="refresh-cw" class="w-3 h-3"></i> Atualizar Notícias
            </button>
        </div>
    </div>

    <!-- ================= LÓGICA JAVASCRIPT ================= -->
    <script>
        // Inicializa ícones
        lucide.createIcons();

        // --- ESTADO GLOBAL ---
        const state = {
            feeds: {
                nacional: 'https://g1.globo.com/rss/g1/',
                internacional: 'https://rss.nytimes.com/services/xml/rss/nyt/World.xml',
                esportes: 'https://ge.globo.com/rss/ge/',
                variados: 'https://rss.uol.com.br/feed/tecnologia.xml'
            },
            news: [], // Array de strings (manchetes)
            currentDateStr: '',
            
            // Configs Visuais
            speed: 2.0, // Pixels por frame
            pos: 0,
            bgColor: '#000000',
            textColor: '#ffffff',
            sepColor: '#ff0000',
            sepText: 'ScrollNews',
            fontSize: 10, // vh
            isUppercase: true,
            
            // Flags
            isRotated: false,
            isFullscreen: false
        };

        // --- ELEMENTOS DOM ---
        const track = document.getElementById('scroller-track');
        const container = document.getElementById('scroller-container');
        const settingsPanel = document.getElementById('settings-panel');
        
        // --- 1. ENGINE DE ANIMAÇÃO (Animation Loop) ---
        function animate() {
            // Move a posição
            state.pos -= state.speed;
            
            // Lógica de Loop Infinito
            // O conteúdo é duplicado (Set A + Set B). Quando Set A sai da tela, resetamos para 0.
            // Precisamos saber a largura da METADE do conteúdo total.
            const totalWidth = track.scrollWidth;
            const singleSetWidth = totalWidth / 2;

            if (singleSetWidth > 0 && state.pos <= -singleSetWidth) {
                state.pos += singleSetWidth; // Ajuste suave sem pular para 0 bruscamente se speed for alta
                if (state.pos <= -singleSetWidth) state.pos = 0; // Fallback
            }

            // Aplica transformação
            track.style.transform = `translate3d(${state.pos}px, 0, 0)`;

            requestAnimationFrame(animate);
        }

        // --- 2. RENDERIZAÇÃO DOM ---
        function renderContent() {
            // Monta lista final
            let items = [];
            
            // Adiciona Data/Hora se ativo
            if (document.getElementById('check-tempo').checked) {
                items.push(state.currentDateStr);
            }
            
            // Adiciona Notícias
            items = items.concat(state.news);

            if (items.length === 0) items = ["Selecione categorias no menu..."];

            // Helper para criar HTML de um item
            const createItemHTML = (text) => `
                <div class="news-item">
                    <span style="
                        padding: 0 4vh;
                        font-weight: 700;
                        line-height: 1;
                        white-space: nowrap;
                        color: ${state.textColor};
                        font-size: ${state.fontSize}vh;
                        text-transform: ${state.isUppercase ? 'uppercase' : 'none'};
                    ">${text}</span>
                    
                    <span style="
                        padding: 0 2vh;
                        font-weight: 900;
                        letter-spacing: 0.1em;
                        white-space: nowrap;
                        color: ${state.sepColor};
                        font-size: ${state.fontSize * 0.6}vh;
                        transform: translateY(10%);
                    ">● ${state.sepText} ●</span>
                </div>
            `;

            // Gera HTML para Set A
            const setA = items.map(createItemHTML).join('');
            // Gera HTML para Set B (Duplicata para loop)
            const setB = items.map(createItemHTML).join('');

            // Injeta no DOM
            track.innerHTML = setA + setB;
        }

        // --- 3. RELÓGIO E DATA ---
        function updateTime() {
            const now = new Date();
            const dateOpts = { weekday: 'long', day: 'numeric', month: 'long' };
            const timeOpts = { hour: '2-digit', minute: '2-digit' };
            state.currentDateStr = `${now.toLocaleDateString('pt-BR', dateOpts)} • ${now.toLocaleTimeString('pt-BR', timeOpts)}`;
            
            // Se não tiver notícias e só relógio, precisamos re-renderizar para atualizar o segundo
            // Mas para performance, idealmente atualizamos só o texto, porém aqui vamos simplificar:
            // Se a lista de notícias for pequena ou vazia, re-renderizar é ok.
            // Para não quebrar o layout durante a digitação de settings, vamos atualizar somente se necessário
            // ou via timer separado. Por simplicidade neste single-file, faremos update via timer
        }
        
        // Atualiza a string de tempo a cada segundo e se não houver noticias, força render
        setInterval(() => {
            const oldTime = state.currentDateStr;
            updateTime();
            // Se estiver mostrando tempo, atualiza o DOM específico do tempo seria o ideal,
            // mas vamos re-renderizar tudo a cada minuto ou se news estiver vazio
            if (state.news.length === 0 || new Date().getSeconds() === 0) {
                renderContent();
            }
        }, 1000);

        // --- 4. BUSCA DE NOTÍCIAS (RSS) ---
        async function fetchNews() {
            const btn = document.getElementById('btn-refresh');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Carregando...';
            btn.disabled = true;

            let allHeadlines = [];
            const activeFeeds = [];

            if(document.getElementById('check-nacional').checked) activeFeeds.push(state.feeds.nacional);
            if(document.getElementById('check-internacional').checked) activeFeeds.push(state.feeds.internacional);
            if(document.getElementById('check-esportes').checked) activeFeeds.push(state.feeds.esportes);

            const promises = activeFeeds.map(async (url) => {
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
                    const data = await res.json();
                    return data.items ? data.items.map(i => i.title) : [];
                } catch(e) { return []; }
            });

            const results = await Promise.all(promises);
            results.forEach(titles => allHeadlines = [...allHeadlines, ...titles]);

            // Limpa e filtra
            state.news = [...new Set(allHeadlines)]
                .map(t => t.replace(/<[^>]*>?/gm, '').trim())
                .slice(0, 30); // Limite 30

            renderContent();
            
            btn.innerHTML = originalText;
            btn.disabled = false;
        }

        // --- 5. EVENTOS E UI ---
        
        // Toggle Settings
        const btnOpen = document.getElementById('btn-open-settings');
        const btnClose = document.getElementById('btn-close-settings');
        
        btnOpen.addEventListener('click', () => {
            settingsPanel.classList.remove('translate-x-full');
            btnOpen.classList.add('opacity-0', 'pointer-events-none');
        });
        
        btnClose.addEventListener('click', () => {
            settingsPanel.classList.add('translate-x-full');
            btnOpen.classList.remove('opacity-0', 'pointer-events-none');
        });

        // Inputs de Aparência (Live Update)
        const updateStyle = () => {
            state.bgColor = document.getElementById('color-bg').value;
            state.textColor = document.getElementById('color-text').value;
            state.sepColor = document.getElementById('color-separator').value;
            state.fontSize = document.getElementById('input-fontsize').value;
            state.sepText = document.getElementById('input-sep-text').value;
            state.isUppercase = document.getElementById('check-uppercase').checked;
            
            document.body.style.backgroundColor = state.bgColor;
            renderContent(); // Re-renderiza para aplicar tamanhos e cores inline
        };

        ['color-bg', 'color-text', 'color-separator', 'input-fontsize', 'input-sep-text', 'check-uppercase'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateStyle);
        });

        // Speed Control (Não precisa re-renderizar DOM, só muda var)
        const speedInput = document.getElementById('input-speed');
        const speedDisplay = document.getElementById('speed-display');
        speedInput.addEventListener('input', (e) => {
            state.speed = parseFloat(e.target.value);
            speedDisplay.innerText = state.speed.toFixed(1) + 'x';
        });

        // Checkboxes de Tópicos
        ['check-nacional', 'check-internacional', 'check-esportes'].forEach(id => {
            document.getElementById(id).addEventListener('change', fetchNews);
        });
        
        document.getElementById('check-tempo').addEventListener('change', renderContent);

        // Botão Atualizar
        document.getElementById('btn-refresh').addEventListener('click', fetchNews);

        // Fullscreen
        document.getElementById('btn-fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Rotação (Software)
        document.getElementById('btn-rotate').addEventListener('click', () => {
            state.isRotated = !state.isRotated;
            if (state.isRotated) {
                container.classList.add('rotated-mode');
            } else {
                container.classList.remove('rotated-mode');
            }
        });

        // --- INICIALIZAÇÃO ---
        updateTime();
        fetchNews();     // Busca notícias iniciais
        updateStyle();   // Aplica estilos iniciais
        animate();       // Inicia loop de animação

    </script>
</body>
</html>
