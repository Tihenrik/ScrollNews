<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ScrollNews</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* --- CORREÇÃO AGRESSIVA DE FUNDO --- */
        :root {
            --app-bg: #000000;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--app-bg) !important;
            overscroll-behavior: none; /* Impede o efeito elástico branco */
            position: fixed; /* Trava o scroll nativo do Android */
        }

        /* Camada de segurança preta atrás de tudo */
        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-color: var(--app-bg);
            z-index: -10;
            pointer-events: none;
        }

        /* --- WRAPPER PRINCIPAL (O segredo do Fullscreen) --- */
        #app-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--app-bg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Força o wrapper a ocupar tudo quando em fullscreen */
        #app-wrapper:fullscreen {
            width: 100vw;
            height: 100vh;
            background-color: var(--app-bg);
        }
        
        #app-wrapper:-webkit-full-screen {
            width: 100vw;
            height: 100vh;
            background-color: var(--app-bg);
        }

        /* --- ENGINE DO SCROLL --- */
        #scroller-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            overflow: hidden;
            z-index: 1;
        }

        #scroller-track {
            display: flex;
            align-items: center;
            white-space: nowrap;
            will-change: transform;
        }

        .news-item {
            display: flex;
            align-items: center;
        }

        /* --- MENU LATERAL --- */
        #settings-panel {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute; /* Mudado de fixed para absolute para ficar dentro do wrapper */
            height: 100%;
            z-index: 999;
        }
        
        /* --- SLIDERS --- */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #4B5563;
            border-radius: 2px;
        }
        
        .rotated-mode {
            width: 100vh !important;
            height: 100vw !important;
            transform: translate(-50%, -50%) rotate(90deg) !important;
        }
    </style>
</head>
<body>

    <!-- WRAPPER PARA FULLSCREEN -->
    <div id="app-wrapper">

        <!-- ================= CONTEÚDO PRINCIPAL ================= -->
        <div id="scroller-container">
            <div id="scroller-track"></div>
        </div>

        <!-- Botão Flutuante (Dentro do wrapper para não sumir no fullscreen) -->
        <button id="btn-open-settings" class="absolute bottom-6 right-6 z-50 p-3 bg-white/10 hover:bg-white/20 text-white rounded-full backdrop-blur-md shadow-lg border border-white/10 transition-transform hover:scale-110 group">
            <i data-lucide="settings" class="group-hover:rotate-90 transition-transform duration-500"></i>
        </button>

        <!-- ================= PAINEL DE CONTROLE ================= -->
        <div id="settings-panel" class="inset-y-0 right-0 w-80 bg-zinc-900/95 backdrop-blur-xl border-l border-white/10 shadow-2xl transform translate-x-full text-gray-200 flex flex-col">
            
            <!-- Header -->
            <div class="p-5 border-b border-white/10 flex justify-between items-center bg-black/20">
                <h2 class="font-bold flex items-center gap-2 text-white">
                    <i data-lucide="layout-template" class="text-blue-500 w-5 h-5"></i> Configurações
                </h2>
                <button id="btn-close-settings" class="hover:text-white text-gray-400">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <!-- Conteúdo Scrollável -->
            <div class="flex-1 overflow-y-auto p-5 space-y-6 custom-scrollbar">
                
                <!-- Controles de Tela -->
                <div class="grid grid-cols-2 gap-3">
                    <button id="btn-fullscreen" class="flex flex-col items-center justify-center p-3 rounded bg-white/5 hover:bg-white/10 border border-white/5 transition-colors">
                        <i data-lucide="maximize" class="w-5 h-5 mb-1"></i>
                        <span class="text-[10px] font-bold uppercase">Fullscreen</span>
                    </button>
                    <button id="btn-rotate" class="flex flex-col items-center justify-center p-3 rounded bg-white/5 hover:bg-white/10 border border-white/5 transition-colors">
                        <i data-lucide="smartphone" class="w-5 h-5 mb-1"></i>
                        <span class="text-[10px] font-bold uppercase">Girar Tela</span>
                    </button>
                </div>

                <!-- Tópicos -->
                <section class="space-y-2">
                    <h3 class="text-xs font-bold text-gray-500 uppercase flex items-center gap-2">
                        <i data-lucide="filter" class="w-3 h-3"></i> Filtros (Categorias)
                    </h3>
                    <label class="flex items-center justify-between p-2 rounded cursor-pointer hover:bg-white/5 bg-zinc-800/50 border border-transparent hover:border-white/10 transition-all">
                        <span class="text-xs font-medium">Nacional</span>
                        <input type="checkbox" id="check-nacional" checked class="accent-blue-500 w-4 h-4 rounded">
                    </label>
                    <label class="flex items-center justify-between p-2 rounded cursor-pointer hover:bg-white/5 bg-zinc-800/50 border border-transparent hover:border-white/10 transition-all">
                        <span class="text-xs font-medium">Internacional</span>
                        <input type="checkbox" id="check-internacional" checked class="accent-blue-500 w-4 h-4 rounded">
                    </label>
                    <label class="flex items-center justify-between p-2 rounded cursor-pointer hover:bg-white/5 bg-zinc-800/50 border border-transparent hover:border-white/10 transition-all">
                        <span class="text-xs font-medium">Esportes</span>
                        <input type="checkbox" id="check-esportes" checked class="accent-blue-500 w-4 h-4 rounded">
                    </label>
                    <label class="flex items-center justify-between p-2 rounded cursor-pointer hover:bg-white/5 bg-zinc-800/50 border border-transparent hover:border-white/10 transition-all">
                        <span class="text-xs font-medium text-yellow-400 flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i> Data e Hora</span>
                        <input type="checkbox" id="check-tempo" checked class="accent-yellow-400 w-4 h-4 rounded">
                    </label>
                </section>

                <!-- Velocidade -->
                <section class="bg-blue-900/20 p-4 rounded-lg border border-blue-500/20">
                    <div class="flex justify-between text-xs font-bold text-blue-200 mb-2">
                        <span class="flex items-center gap-1"><i data-lucide="zap" class="w-3 h-3"></i> VELOCIDADE</span>
                        <span id="speed-display">6.0x</span>
                    </div>
                    <input type="range" id="input-speed" min="0" max="15" step="0.1" value="6.0" class="w-full">
                </section>

                <!-- Aparência -->
                <section class="space-y-4">
                    <h3 class="text-xs font-bold text-gray-500 uppercase flex items-center gap-2">
                        <i data-lucide="palette" class="w-3 h-3"></i> Estilo
                    </h3>
                    
                    <div class="grid grid-cols-3 gap-2">
                        <div class="flex flex-col gap-1">
                            <label class="text-[9px] text-gray-500 font-bold uppercase">Fundo</label>
                            <input type="color" id="color-bg" value="#000000" class="w-full h-8 rounded cursor-pointer border border-white/20">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[9px] text-gray-500 font-bold uppercase">Texto</label>
                            <input type="color" id="color-text" value="#ffffff" class="w-full h-8 rounded cursor-pointer border border-white/20">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[9px] text-gray-500 font-bold uppercase">Separador</label>
                            <input type="color" id="color-separator" value="#ff0000" class="w-full h-8 rounded cursor-pointer border border-white/20">
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between text-[10px] text-gray-500 font-bold uppercase mb-1">
                            <span>Tamanho da Fonte</span>
                            <span id="fontsize-display" class="text-blue-400">20vh</span>
                        </div>
                        <input type="range" id="input-fontsize" min="2" max="35" step="0.5" value="20" class="w-full accent-white">
                    </div>
                    
                    <label class="flex items-center gap-2 pt-2 border-t border-white/5">
                        <input type="checkbox" id="check-uppercase" checked class="accent-blue-500 w-4 h-4 rounded">
                        <span class="text-xs text-gray-400">TEXTO EM CAIXA ALTA</span>
                    </label>
                </section>
            </div>

            <!-- Footer -->
            <div class="p-4 border-t border-white/10 bg-black/20">
                <button id="btn-refresh" class="w-full py-3 bg-white/10 hover:bg-white/20 active:bg-white/30 text-white text-xs font-bold rounded flex items-center justify-center gap-2 transition-all">
                    <i data-lucide="refresh-cw" class="w-3 h-3"></i> Atualizar Agora
                </button>
            </div>
        </div>

    </div> <!-- Fim do Wrapper -->

    <script>
        lucide.createIcons();
        const CONFIG_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxaq9YZdf8mZjC-kWHHR6LljaM5u2g3wQgRAQrdP9z5uoRXKja7904G5oL_qYunuwU8L3Y58qmz2NO/pub?gid=0&single=true&output=csv'; 

        const state = {
            news: [], 
            currentDateStr: '',
            speed: 6.0, 
            pos: 0,
            bgColor: '#000000',
            textColor: '#ffffff',
            sepColor: '#ff0000',
            sepText: 'ScrollNews', 
            fontSize: 20, 
            isUppercase: true,
            isRotated: false
        };

        const track = document.getElementById('scroller-track');
        const container = document.getElementById('scroller-container');
        const settingsPanel = document.getElementById('settings-panel');
        const appWrapper = document.getElementById('app-wrapper');
        
        function animate() {
            state.pos -= state.speed;
            const totalWidth = track.scrollWidth;
            const singleSetWidth = totalWidth / 2;

            if (singleSetWidth > 0 && state.pos <= -singleSetWidth) {
                state.pos += singleSetWidth; 
                if (state.pos <= -singleSetWidth) state.pos = 0;
            }
            track.style.transform = `translate3d(${state.pos}px, 0, 0)`;
            requestAnimationFrame(animate);
        }

        function renderContent() {
            let items = [];
            if (document.getElementById('check-tempo').checked) items.push(state.currentDateStr);
            items = items.concat(state.news);

            if (items.length === 0 || (items.length === 1 && items[0] === state.currentDateStr)) {
                 if(!CONFIG_CSV_URL || CONFIG_CSV_URL.includes('COLE_SEU_LINK')) items.push("URL do CSV não configurada.");
                 else items.push("Carregando notícias...");
            }

            const createItemHTML = (text) => `
                <div class="news-item">
                    <span style="
                        padding: 0 4vh;
                        font-weight: 700;
                        line-height: 1;
                        white-space: nowrap;
                        color: ${state.textColor};
                        font-size: ${state.fontSize}vh;
                        text-transform: ${state.isUppercase ? 'uppercase' : 'none'};
                    ">${text}</span>
                    
                    <span style="
                        padding: 0 2vh;
                        font-weight: 900;
                        letter-spacing: 0.1em;
                        white-space: nowrap;
                        color: ${state.sepColor};
                        font-size: ${state.fontSize * 0.6}vh;
                        transform: translateY(10%);
                    ">● ${state.sepText} ●</span>
                </div>
            `;
            const setA = items.map(createItemHTML).join('');
            const setB = items.map(createItemHTML).join('');
            track.innerHTML = setA + setB;
        }

        function updateTime() {
            const now = new Date();
            const dateOpts = { weekday: 'long', day: 'numeric', month: 'long' };
            const timeOpts = { hour: '2-digit', minute: '2-digit' };
            let dateString = now.toLocaleDateString('pt-BR', dateOpts);
            dateString = dateString.charAt(0).toUpperCase() + dateString.slice(1);
            state.currentDateStr = `${dateString} • ${now.toLocaleTimeString('pt-BR', timeOpts)}`;
        }
        
        setInterval(() => {
            updateTime();
            const now = new Date();
            if (state.news.length === 0 || now.getSeconds() === 0) renderContent();
        }, 1000);

        function parseCSV(csvText) {
            const lines = csvText.split(/\r\n|\n/);
            const result = [];
            const splitRegex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const columns = line.split(splitRegex);
                if (columns.length >= 2) {
                    const cat = columns[0].replace(/^"|"$/g, '').trim().toLowerCase();
                    const tit = columns[1].replace(/^"|"$/g, '').trim();
                    if(tit) result.push({ category: cat, title: tit });
                }
            }
            return result;
        }

        async function fetchNews() {
            const btn = document.getElementById('btn-refresh');
            const originalText = btn.innerHTML;
            if (!CONFIG_CSV_URL) { renderContent(); return; }
            btn.innerHTML = '<i data-lucide="loader" class="animate-spin w-3 h-3"></i> Atualizando...';
            btn.disabled = true;

            try {
                const cacheBuster = CONFIG_CSV_URL + (CONFIG_CSV_URL.includes('?') ? '&' : '?') + 't=' + new Date().getTime();
                const res = await fetch(cacheBuster);
                if (!res.ok) throw new Error("Erro na rede");
                const textData = await res.text();
                const parsedData = parseCSV(textData);
                
                const activeFilters = [];
                if(document.getElementById('check-nacional').checked) activeFilters.push('nacional');
                if(document.getElementById('check-internacional').checked) activeFilters.push('internacional');
                if(document.getElementById('check-esportes').checked) activeFilters.push('esportes');

                state.news = parsedData
                    .filter(item => activeFilters.includes(item.category))
                    .map(item => item.title);

            } catch(e) { 
                console.error("Erro CSV:", e);
                state.news = ["Erro ao carregar dados. Verifique a conexão."];
            }
            renderContent();
            btn.innerHTML = originalText;
            btn.disabled = false;
            lucide.createIcons();
        }

        const btnOpen = document.getElementById('btn-open-settings');
        const btnClose = document.getElementById('btn-close-settings');
        
        btnOpen.addEventListener('click', () => {
            settingsPanel.classList.remove('translate-x-full');
            btnOpen.classList.add('translate-x-20', 'opacity-0');
        });
        
        btnClose.addEventListener('click', () => {
            settingsPanel.classList.add('translate-x-full');
            btnOpen.classList.remove('translate-x-20', 'opacity-0');
        });

        const updateStyle = () => {
            state.bgColor = document.getElementById('color-bg').value;
            state.textColor = document.getElementById('color-text').value;
            state.sepColor = document.getElementById('color-separator').value;
            state.fontSize = document.getElementById('input-fontsize').value;
            state.isUppercase = document.getElementById('check-uppercase').checked;
            
            document.getElementById('fontsize-display').innerText = state.fontSize + 'vh';
            
            // --- CORREÇÃO SUPREMA DE VARIÁVEIS CSS ---
            // Atualiza a variável CSS que controla o fundo de TUDO
            document.documentElement.style.setProperty('--app-bg', state.bgColor);
            
            // Atualiza meta tag theme-color
            const metaThemeColor = document.querySelector('meta[name="theme-color"]');
            if (metaThemeColor) metaThemeColor.setAttribute('content', state.bgColor);

            renderContent();
        };

        ['color-bg', 'color-text', 'color-separator', 'input-fontsize', 'check-uppercase'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateStyle);
        });

        const speedInput = document.getElementById('input-speed');
        speedInput.addEventListener('input', (e) => {
            state.speed = parseFloat(e.target.value);
            document.getElementById('speed-display').innerText = state.speed.toFixed(1) + 'x';
        });

        ['check-nacional', 'check-internacional', 'check-esportes'].forEach(id => {
            document.getElementById(id).addEventListener('change', fetchNews);
        });
        document.getElementById('check-tempo').addEventListener('change', renderContent);

        document.getElementById('btn-refresh').addEventListener('click', fetchNews);

        // --- MUDANÇA CRÍTICA NO FULLSCREEN ---
        // Ao invés de documentElement, usamos o appWrapper
        document.getElementById('btn-fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                // Tenta fullscreen no wrapper primeiro
                if (appWrapper.requestFullscreen) appWrapper.requestFullscreen().catch(err => console.log(err));
                else if (appWrapper.webkitRequestFullscreen) appWrapper.webkitRequestFullscreen(); // Safari/Chrome antigos
                else if (appWrapper.msRequestFullscreen) appWrapper.msRequestFullscreen(); // IE/Edge
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        });

        document.getElementById('btn-rotate').addEventListener('click', () => {
            state.isRotated = !state.isRotated;
            container.classList.toggle('rotated-mode', state.isRotated);
        });

        setInterval(() => { if(CONFIG_CSV_URL) fetchNews(); }, 300000);

        updateTime();
        if(CONFIG_CSV_URL) fetchNews(); else renderContent();
        
        updateStyle();
        animate();
    </script>
</body>
</html>
