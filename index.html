<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LED Scroller PRO</title>

<style>
    body{
        margin:0; background:#000; color:#fff; font-family:Arial;
        display:flex; flex-direction:column; height:100vh;
    }
    header{
        display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
        padding:10px; background:#0c0c0c; border-bottom:2px solid #111;
    }
    select,input{ padding:8px;border-radius:6px;border:none;background:#1c1c1c;color:#fff;font-size:15px;}
    
    #display{
        flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden;
        white-space:nowrap; position:relative;
    }
    #texto{
        position:absolute; white-space:nowrap; text-shadow:0 0 12px currentColor;
        animation:scroll 15s linear infinite;
    }

    @keyframes scroll{ from{transform:translateX(100%)} to{transform:translateX(-100%)} }

</style>
</head>
<body>

<header>
    <select id="categoria">
        <option value="br">🇧🇷 Notícias Brasil</option>
        <option value="world">🌍 Notícias Mundo</option>
        <option value="economy">💰 Economia</option>
        <option value="sports">🏆 Esportes</option>
        <option value="technology">💻 Tecnologia</option>
        <option value="science">🔬 Ciência</option>
        <option value="hora">🕒 Hora / Data</option>
    </select>

    <input type="color" id="corTexto" value="#00ff00">
    <input type="color" id="corFundo" value="#000000">
    <input type="range" id="velocidade" min="5" max="80" value="25">
    <input type="range" id="tamanho" min="20" max="100" value="60">
</header>

<div id="display">
    <span id="texto">Carregando...</span>
</div>

<script>
const texto = document.getElementById("texto");
const display = document.getElementById("display");

// 🔥 Feeds RSS convertidos em JSON prontos sem API Key
const fontes = {
    br:      "https://gnews.io/api/v4/top-headlines?category=general&lang=pt&country=br&apikey=demo",
    world:   "https://gnews.io/api/v4/top-headlines?category=world&lang=pt&apikey=demo",
    sports:  "https://gnews.io/api/v4/top-headlines?category=sports&lang=pt&apikey=demo",
    economy: "https://gnews.io/api/v4/top-headlines?category=business&lang=pt&apikey=demo",
    technology:"https://gnews.io/api/v4/top-headlines?category=technology&lang=pt&apikey=demo",
    science: "https://gnews.io/api/v4/top-headlines?category=science&lang=pt&apikey=demo"
};

async function atualizar(){
    let cat = document.getElementById("categoria").value;

    if(cat==="hora"){
        setInterval(()=>texto.textContent=new Date().toLocaleString(),1000);
        return;
    }

    try{
        const r = await fetch(fontes[cat]);
        const j = await r.json();
        texto.textContent = j.articles.map(a=>a.title).join("  ✦  ");
    }catch{
        texto.textContent = "Erro ao obter notícias.";
    }
    estilizar();
}

function estilizar(){
    texto.style.color = document.getElementById("corTexto").value;
    display.style.background = document.getElementById("corFundo").value;
    texto.style.fontSize = document.getElementById("tamanho").value+"px";

    let v = document.getElementById("velocidade").value;
    texto.style.animationDuration = (120/v)+"s";
}

document.querySelectorAll("select,input").forEach(e=>e.oninput=estilizar);
document.getElementById("categoria").onchange=atualizar;

atualizar(); setInterval(atualizar, 180000); // atualiza a cada 3 minutos
</script>
</body>
</html>
