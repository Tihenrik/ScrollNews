<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LED News Scroller</title>

<style>
    body {
        margin: 0;
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    header {
        padding: 10px;
        background: #1c1c1c;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        border-bottom: 2px solid #333;
    }

    select, input[type="color"], input[type="range"] {
        padding: 6px;
        font-size: 14px;
        border-radius: 5px;
        border: none;
        outline: none;
    }
    .viewer {
        flex: 1;
        display: flex;
        align-items: center;
        overflow: hidden;
        white-space: nowrap;
        position: relative;
    }

    #scrollText {
        white-space: nowrap;
        position: absolute;
        animation: scroll linear infinite;
    }

    @keyframes scroll {
        from { transform: translateX(100%); }
        to { transform: translateX(-100%); }
    }
</style>
</head>
<body>

<header>
    <select id="categoria">
        <option value="general">Misto (Geral)</option>
        <option value="technology">Tecnologia</option>
        <option value="sports">Esportes</option>
        <option value="business">Economia</option>
        <option value="science">Ciência</option>
        <option value="health">Saúde</option>
    </select>

    <input type="color" id="corTexto" value="#00ff00" title="Cor do texto">
    <input type="color" id="corFundo" value="#000000" title="Cor do fundo">
    <input type="range" id="velocidade" min="5" max="60" value="20" title="Velocidade">
    <input type="range" id="tamanho" min="16" max="90" value="40" title="Tamanho da fonte">
</header>

<div class="viewer" id="viewer">
    <span id="scrollText">Carregando notícias...</span>
</div>

<script>
const key = "5fbaa4278d9d4d999e7a3fea5e57c91f"; // <── coloque sua KEY da NewsAPI.org
const texto = document.getElementById("scrollText");
const viewer = document.getElementById("viewer");

async function carregarNoticias(){
    const categoria = document.getElementById("categoria").value;
    const url = `https://newsapi.org/v2/top-headlines?country=br&category=${categoria}&apiKey=${key}`;

    try{
        const res = await fetch(url);
        const data = await res.json();

        let manchetes = data.articles.map(n => n.title).join("   ✦   ");
        texto.textContent = manchetes || "Nenhuma notícia encontrada";
        atualizarEstilos();
    }catch{
        texto.textContent = "Erro ao carregar notícias.";
    }
}

function atualizarEstilos(){
    texto.style.color = document.getElementById("corTexto").value;
    viewer.style.background = document.getElementById("corFundo").value;
    texto.style.fontSize = document.getElementById("tamanho").value + "px";

    const vel = document.getElementById("velocidade").value;
    texto.style.animationDuration = (80 / vel) + "s"; // mais suave e proporcional
}

document.querySelectorAll("select,input").forEach(el =>
    el.addEventListener("input", atualizarEstilos)
);

document.getElementById("categoria").addEventListener("change", carregarNoticias);

// Atualiza auto a cada 5min
setInterval(carregarNoticias, 300000);
carregarNoticias();
</script>

</body>
</html>
